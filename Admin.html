<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Tendencia Perfumes</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --noir: #0a0a0a;
  --noir2: #111111;
  --noir3: #1a1a1a;
  --or: #c9a96e;
  --or2: #e8cc99;
  --creme: #f5f0e8;
  --gris: #888888;
  --gris2: #555555;
  --border: rgba(201,169,110,0.2);
  --border2: rgba(201,169,110,0.08);
  --danger: #ef4444;
  --danger-soft: rgba(239,68,68,0.1);
  --success: #4ade80;
  --success-soft: rgba(74,222,128,0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Jost', sans-serif;
  background: var(--noir);
  color: var(--creme);
  display: flex;
  min-height: 100vh;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 240px;
  background: var(--noir2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  left: 0; top: 0; bottom: 0;
  z-index: 20;
  transition: transform 0.3s ease;
}

.sidebar-logo {
  padding: 36px 28px 28px;
  border-bottom: 1px solid var(--border2);
}

.sidebar-logo h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 300;
  letter-spacing: 0.2em;
  color: var(--or2);
  text-transform: uppercase;
}

.sidebar-logo p {
  font-size: 10px;
  color: var(--gris2);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-top: 4px;
}

.sidebar-nav {
  flex: 1;
  padding: 24px 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: transparent;
  border: none;
  color: var(--gris);
  font-family: 'Jost', sans-serif;
  font-size: 12px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  text-align: left;
  width: 100%;
  border-radius: 2px;
  transition: all 0.25s;
  position: relative;
}

.nav-item:hover {
  color: var(--creme);
  background: var(--border2);
}

.nav-item.active {
  color: var(--or);
  background: rgba(201,169,110,0.07);
}

.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 20%; bottom: 20%;
  width: 2px;
  background: var(--or);
  border-radius: 0 2px 2px 0;
}

.nav-icon { font-size: 16px; width: 20px; text-align: center; }

.sidebar-footer {
  padding: 16px;
  border-top: 1px solid var(--border2);
}

.logout-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: none;
  border: 1px solid transparent;
  color: var(--gris2);
  font-family: 'Jost', sans-serif;
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  transition: all 0.3s;
}

.logout-btn:hover {
  border-color: var(--danger);
  color: var(--danger);
}

/* ── MAIN ── */
.main {
  margin-left: 240px;
  flex: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── TOP BAR ── */
.topbar {
  padding: 24px 40px;
  border-bottom: 1px solid var(--border2);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(10,10,10,0.9);
  backdrop-filter: blur(8px);
  position: sticky;
  top: 0;
  z-index: 10;
}

.page-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
  font-weight: 300;
  color: var(--creme);
}

.page-title span {
  font-style: italic;
  color: var(--or2);
}

.topbar-actions {
  display: flex;
  gap: 12px;
  align-items: center;
}

/* ── CONTENT ── */
.content { padding: 40px; flex: 1; }

/* ── FORM CARD ── */
.form-card {
  background: var(--noir2);
  border: 1px solid var(--border2);
  padding: 36px;
  margin-bottom: 32px;
}

.form-card-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 300;
  color: var(--creme);
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.form-card-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border2);
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.form-group { margin-bottom: 16px; }

.form-label {
  display: block;
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gris);
  margin-bottom: 8px;
}

.form-input, .form-select {
  width: 100%;
  padding: 12px 16px;
  background: var(--noir3);
  border: 1px solid var(--border2);
  color: var(--creme);
  font-family: 'Jost', sans-serif;
  font-size: 13px;
  font-weight: 300;
  outline: none;
  transition: border-color 0.3s;
  border-radius: 0;
}

.form-input:focus, .form-select:focus { border-color: var(--or); }
.form-input::placeholder { color: var(--gris2); }

.form-select option {
  background: var(--noir3);
  color: var(--creme);
}

/* Toolbar editor */
.toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 12px;
  background: var(--noir3);
  border: 1px solid var(--border2);
  border-bottom: none;
  margin-top: 16px;
}

.toolbar-btn, .toolbar-select {
  background: var(--noir2);
  border: 1px solid var(--border2);
  color: var(--creme);
  padding: 6px 12px;
  font-family: 'Jost', sans-serif;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.25s;
  outline: none;
  border-radius: 0;
}

.toolbar-btn:hover { border-color: var(--or); color: var(--or); }
.toolbar-color { padding: 4px; width: 36px; height: 32px; cursor: pointer; border-radius: 0; }

.editor-area {
  background: #fafaf8;
  color: #1a1a1a;
  padding: 24px;
  min-height: 200px;
  border: 1px solid var(--border2);
  outline: none;
  font-family: 'Jost', sans-serif;
  font-size: 14px;
  line-height: 1.8;
}

/* ── BUTTONS ── */
.btn {
  padding: 12px 28px;
  font-family: 'Jost', sans-serif;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  border: none;
  transition: all 0.3s;
}

.btn-primary {
  background: var(--or);
  color: var(--noir);
}

.btn-primary:hover {
  background: var(--or2);
  transform: translateY(-1px);
  box-shadow: 0 6px 16px rgba(201,169,110,0.2);
}

.btn-outline {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--gris);
}

.btn-outline:hover { border-color: var(--or); color: var(--or); }

.btn-danger {
  background: var(--danger-soft);
  border: 1px solid transparent;
  color: var(--danger);
  padding: 8px 16px;
  font-size: 11px;
  letter-spacing: 0.1em;
}

.btn-danger:hover { border-color: var(--danger); }

.btn-edit {
  background: rgba(201,169,110,0.08);
  border: 1px solid transparent;
  color: var(--or);
  padding: 8px 16px;
  font-size: 11px;
  letter-spacing: 0.1em;
}

.btn-edit:hover { border-color: var(--or); }

/* ── ITEMS LIST ── */
.items-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}

.item-card {
  background: var(--noir2);
  border: 1px solid var(--border2);
  overflow: hidden;
  transition: all 0.3s;
  animation: cardIn 0.3s ease;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.item-card:hover {
  border-color: var(--border);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}

.item-card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
  filter: brightness(0.85);
  transition: filter 0.3s;
}

.item-card:hover img { filter: brightness(0.95); }

.item-body {
  padding: 16px 20px;
}

.item-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  color: var(--creme);
  margin-bottom: 4px;
}

.item-meta {
  font-size: 11px;
  color: var(--gris);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.item-actions {
  display: flex;
  gap: 8px;
}

/* ── POLITICAS ── */
.politica-card {
  background: var(--noir2);
  border: 1px solid var(--border2);
  padding: 24px;
  margin-bottom: 12px;
  transition: border-color 0.3s;
  animation: cardIn 0.3s ease;
}

.politica-card:hover { border-color: var(--border); }

.politica-titulo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 400;
  color: var(--creme);
  margin-bottom: 10px;
}

.politica-preview {
  font-size: 13px;
  color: var(--gris);
  line-height: 1.7;
  margin-bottom: 16px;
  max-height: 80px;
  overflow: hidden;
  position: relative;
}

.politica-preview::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 30px;
  background: linear-gradient(transparent, var(--noir2));
}

.politica-actions {
  display: flex;
  gap: 8px;
}

/* ── STATS ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 32px;
}

.stat-card {
  background: var(--noir2);
  border: 1px solid var(--border2);
  padding: 24px 28px;
  display: flex;
  align-items: center;
  gap: 20px;
}

.stat-icon {
  font-size: 28px;
  opacity: 0.7;
}

.stat-label {
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gris);
  margin-bottom: 4px;
}

.stat-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 300;
  color: var(--or);
  line-height: 1;
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--noir3);
  border: 1px solid var(--border);
  color: var(--creme);
  padding: 14px 24px;
  font-size: 13px;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.3s;
  z-index: 999;
}
.toast.show { opacity: 1; transform: translateY(0); }

/* ── DASHBOARD ── */
.dash-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}

.dash-card {
  background: var(--noir2);
  border: 1px solid var(--border2);
  padding: 28px 24px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.3s;
}

.dash-card:hover { border-color: var(--border); }

.dash-card::before {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(to right, var(--or), var(--or2));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.4s ease;
}

.dash-card:hover::before { transform: scaleX(1); }

.dash-card-label {
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gris);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.dash-card-icon { font-size: 14px; }

.dash-card-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 44px;
  font-weight: 300;
  color: var(--or);
  line-height: 1;
  margin-bottom: 6px;
}

.dash-card-sub {
  font-size: 11px;
  color: var(--gris2);
  letter-spacing: 0.08em;
}

.dash-card-trend {
  position: absolute;
  top: 20px; right: 20px;
  font-size: 11px;
  color: var(--success);
  background: var(--success-soft);
  padding: 3px 8px;
  border-radius: 99px;
}

/* CHART */
.chart-card {
  background: var(--noir2);
  border: 1px solid var(--border2);
  padding: 28px;
  margin-bottom: 24px;
}

.chart-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}

.chart-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 300;
  color: var(--creme);
}

.chart-filter {
  display: flex;
  gap: 8px;
}

.filter-btn {
  background: var(--noir3);
  border: 1px solid var(--border2);
  color: var(--gris);
  padding: 6px 14px;
  font-family: 'Jost', sans-serif;
  font-size: 11px;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.2s;
}

.filter-btn.active, .filter-btn:hover {
  border-color: var(--or);
  color: var(--or);
}

.chart-wrap {
  position: relative;
  height: 220px;
}

canvas.chart { width: 100% !important; height: 100% !important; }

/* TOP LISTS */
.dash-bottom {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.list-card {
  background: var(--noir2);
  border: 1px solid var(--border2);
  padding: 24px;
}

.list-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  color: var(--creme);
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border2);
}

.list-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border2);
  font-size: 13px;
}

.list-item:last-child { border-bottom: none; }

.list-item-name { color: var(--creme); }
.list-item-val { color: var(--or); font-weight: 500; }

.list-rank {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: var(--gris);
  flex-shrink: 0;
  margin-right: 10px;
}

/* ── PEDIDOS ── */
.pedidos-filters {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  align-items: center;
}

.pedidos-search {
  flex: 1;
  min-width: 200px;
  padding: 10px 16px;
  background: var(--noir2);
  border: 1px solid var(--border2);
  color: var(--creme);
  font-family: 'Jost', sans-serif;
  font-size: 13px;
  outline: none;
  transition: border-color 0.3s;
}

.pedidos-search:focus { border-color: var(--or); }
.pedidos-search::placeholder { color: var(--gris2); }

.estado-filter {
  padding: 10px 16px;
  background: var(--noir2);
  border: 1px solid var(--border2);
  color: var(--creme);
  font-family: 'Jost', sans-serif;
  font-size: 12px;
  outline: none;
  cursor: pointer;
}

.pedidos-table-wrap {
  overflow-x: auto;
}

.pedidos-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.pedidos-table th {
  text-align: left;
  padding: 12px 16px;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gris);
  border-bottom: 1px solid var(--border);
  background: var(--noir2);
  white-space: nowrap;
}

.pedidos-table td {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border2);
  color: var(--creme);
  vertical-align: middle;
}

.pedidos-table tr:hover td { background: rgba(201,169,110,0.03); }

.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 99px;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 500;
}

.badge-pendiente {
  background: rgba(251,191,36,0.12);
  color: #fbbf24;
  border: 1px solid rgba(251,191,36,0.2);
}

.badge-completado {
  background: var(--success-soft);
  color: var(--success);
  border: 1px solid rgba(74,222,128,0.2);
}

.badge-cancelado {
  background: var(--danger-soft);
  color: var(--danger);
  border: 1px solid rgba(239,68,68,0.2);
}

.pedido-total {
  color: var(--or);
  font-weight: 500;
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
}

.btn-ver {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--gris);
  padding: 6px 12px;
  font-size: 11px;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Jost', sans-serif;
}

.btn-ver:hover { border-color: var(--or); color: var(--or); }

/* MODAL PEDIDO */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(4px);
}

.modal {
  background: var(--noir2);
  border: 1px solid var(--border);
  padding: 36px;
  max-width: 560px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  animation: modalIn 0.3s ease;
}

@keyframes modalIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border2);
}

.modal-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  font-weight: 300;
  color: var(--creme);
}

.modal-close {
  background: none;
  border: none;
  color: var(--gris);
  font-size: 20px;
  cursor: pointer;
  padding: 4px 8px;
  transition: color 0.2s;
}

.modal-close:hover { color: var(--danger); }

.modal-row {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border2);
  font-size: 13px;
}

.modal-row:last-child { border-bottom: none; }
.modal-key { color: var(--gris); letter-spacing: 0.08em; }
.modal-val { color: var(--creme); text-align: right; }

.modal-items { margin: 16px 0; }

.modal-item {
  background: var(--noir3);
  border: 1px solid var(--border2);
  padding: 12px 16px;
  margin-bottom: 8px;
}

.modal-item-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  color: var(--creme);
  margin-bottom: 4px;
}

.modal-item-detail { font-size: 12px; color: var(--gris); }
.modal-item-price { font-size: 14px; color: var(--or); margin-top: 4px; }

.estado-select {
  width: 100%;
  padding: 10px 14px;
  background: var(--noir3);
  border: 1px solid var(--border);
  color: var(--creme);
  font-family: 'Jost', sans-serif;
  font-size: 13px;
  margin-top: 16px;
  outline: none;
  cursor: pointer;
}

@media(max-width:900px){
  .dash-bottom { grid-template-columns: 1fr; }
  .dash-stats { grid-template-columns: 1fr 1fr; }
}
@media(max-width:480px){
  .dash-stats { grid-template-columns: 1fr; }
}
  display: none;
  position: fixed;
  top: 16px; left: 16px;
  z-index: 30;
  background: var(--noir2);
  border: 1px solid var(--border);
  color: var(--or);
  width: 40px; height: 40px;
  font-size: 18px;
  align-items: center;
  justify-content: center;
}

@media(max-width:900px){
  .sidebar {
    transform: translateX(-100%);
  }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .menu-toggle { display: flex; }
  .topbar { padding: 16px 20px 16px 64px; }
  .content { padding: 20px; }
  .form-row { grid-template-columns: 1fr; }
  .stats-row { grid-template-columns: 1fr; }
  .items-grid { grid-template-columns: 1fr 1fr; }
}

@media(max-width:480px){
  .items-grid { grid-template-columns: 1fr; }
}

/* ── OVERLAY ── */
.sidebar-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 15;
}
.sidebar-overlay.active { display: block; }
</style>
</head>
<body>

<div class="toast" id="toast"></div>
<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyClkqdEQiTeSdQqjdqbQ4nxTrXbuf9_h-0",
  authDomain: "perfumeria-app.firebaseapp.com",
  projectId: "perfumeria-app"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentSection = 'esencias';
let editingId = null;
let chartInstance = null;
let allPedidos = [];

/* ── TOAST ── */
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800); }

/* ── SIDEBAR MOBILE ── */
function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('active'); }
function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('active'); }

/* ── NAVIGATION ── */
function showSection(section){
  currentSection = section;
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+section).classList.add('active');
  closeSidebar();

  const titles = {
    dashboard: '<span>Dashboard</span>',
    pedidos: 'Gestión de <span>Pedidos</span>',
    esencias: 'Gestión de <span>Esencias</span>',
    envases:  'Gestión de <span>Envases</span>',
    politicas:'Gestión de <span>Políticas</span>'
  };
  document.getElementById('pageTitle').innerHTML = titles[section];

  if(section==='dashboard') renderDashboard();
  if(section==='pedidos')   renderPedidos();
  if(section==='esencias')  renderEsencias();
  if(section==='envases')   renderEnvases();
  if(section==='politicas') renderPoliticas();
}

/* ══════════════════════════════
   DASHBOARD
══════════════════════════════ */
async function renderDashboard(){
  document.getElementById('content').innerHTML = `
    <div class="dash-stats" id="dashStats">
      ${['','','',''].map(()=>`<div class="dash-card"><div class="dash-card-value" style="font-size:28px;color:var(--gris2)">—</div></div>`).join('')}
    </div>
    <div class="chart-card">
      <div class="chart-header">
        <span class="chart-title">Ingresos por día</span>
        <div class="chart-filter">
          <button class="filter-btn active" onclick="setChartRange(7,this)">7d</button>
          <button class="filter-btn" onclick="setChartRange(30,this)">30d</button>
          <button class="filter-btn" onclick="setChartRange(90,this)">90d</button>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="revenueChart" class="chart"></canvas></div>
    </div>
    <div class="dash-bottom">
      <div class="list-card">
        <div class="list-title">Esencias más pedidas</div>
        <div id="topEsencias"><p style="color:var(--gris2);font-size:13px">Cargando...</p></div>
      </div>
      <div class="list-card">
        <div class="list-title">Envases más pedidos</div>
        <div id="topEnvases"><p style="color:var(--gris2);font-size:13px">Cargando...</p></div>
      </div>
    </div>`;

  await cargarDashboard(7);
}

let dashPedidos = [];

async function cargarDashboard(dias){
  try {
    const snap = await db.collection("pedidos").get();
    dashPedidos = [];
    snap.forEach(doc => dashPedidos.push({id: doc.id, ...doc.data()}));

    const ahora = new Date();
    const desde = new Date(ahora - dias * 86400000);

    const recientes = dashPedidos.filter(p => p.fecha && new Date(p.fecha) >= desde);

    // ── STATS CARDS ──
    const totalPedidos = dashPedidos.length;
    const totalIngresos = dashPedidos.filter(p => p.estado !== 'cancelado').reduce((a,p) => a + (Number(p.total)||0), 0);
    const clientesUnicos = [...new Set(dashPedidos.map(p=>p.telefono).filter(Boolean))].length;
    const pedidosPendientes = dashPedidos.filter(p=>p.estado==='pendiente').length;

    document.getElementById('dashStats').innerHTML = `
      <div class="dash-card">
        <div class="dash-card-label"><span class="dash-card-icon">◫</span> Total pedidos</div>
        <div class="dash-card-value">${totalPedidos}</div>
        <div class="dash-card-sub">${recientes.length} en últimos ${dias}d</div>
      </div>
      <div class="dash-card">
        <div class="dash-card-label"><span class="dash-card-icon">◉</span> Clientes únicos</div>
        <div class="dash-card-value">${clientesUnicos}</div>
        <div class="dash-card-sub">Por número de teléfono</div>
      </div>
      <div class="dash-card">
        <div class="dash-card-label"><span class="dash-card-icon">✦</span> Ingresos totales</div>
        <div class="dash-card-value" style="font-size:36px">$${totalIngresos.toFixed(0)}</div>
        <div class="dash-card-sub">$${recientes.filter(p=>p.estado!=='cancelado').reduce((a,p)=>a+(Number(p.total)||0),0).toFixed(0)} en últimos ${dias}d</div>
      </div>
      <div class="dash-card">
        <div class="dash-card-label"><span class="dash-card-icon">◈</span> Pendientes</div>
        <div class="dash-card-value" style="color:#fbbf24">${pedidosPendientes}</div>
        <div class="dash-card-sub">Sin confirmar</div>
      </div>`;

    // ── GRÁFICO ──
    buildChart(dashPedidos, dias);

    // ── TOP ESENCIAS Y ENVASES ──
    const esenciasCount = {};
    const envasesCount  = {};
    dashPedidos.forEach(p => {
      (p.carrito||[]).forEach(item => {
        if(item.esencia) esenciasCount[item.esencia] = (esenciasCount[item.esencia]||0)+1;
        if(item.envase)  envasesCount[item.envase]   = (envasesCount[item.envase]||0)+1;
      });
    });

    const renderTop = (obj, elId) => {
      const sorted = Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,5);
      const el = document.getElementById(elId);
      if(!sorted.length){ el.innerHTML='<p style="color:var(--gris2);font-size:13px">Sin datos aún.</p>'; return; }
      el.innerHTML = sorted.map(([name,cnt],i) => `
        <div class="list-item">
          <div style="display:flex;align-items:center">
            <div class="list-rank">${i+1}</div>
            <span class="list-item-name">${name}</span>
          </div>
          <span class="list-item-val">${cnt} pedidos</span>
        </div>`).join('');
    };
    renderTop(esenciasCount, 'topEsencias');
    renderTop(envasesCount, 'topEnvases');

  } catch(e){ console.error(e); }
}

function buildChart(pedidos, dias){
  const ctx = document.getElementById('revenueChart');
  if(!ctx) return;

  if(chartInstance){ chartInstance.destroy(); chartInstance = null; }

  // Build daily buckets
  const ahora = new Date();
  const labels = [];
  const values = [];

  for(let i = dias-1; i >= 0; i--){
    const d = new Date(ahora - i*86400000);
    const key = d.toLocaleDateString('es-EC', {day:'2-digit', month:'2-digit'});
    labels.push(key);
    const dayStr = d.toISOString().slice(0,10);
    const total = pedidos
      .filter(p => p.fecha && p.fecha.slice(0,10) === dayStr && p.estado !== 'cancelado')
      .reduce((a,p) => a + (Number(p.total)||0), 0);
    values.push(total);
  }

  chartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Ingresos $',
        data: values,
        backgroundColor: 'rgba(201,169,110,0.25)',
        borderColor: '#c9a96e',
        borderWidth: 1,
        borderRadius: 2,
        hoverBackgroundColor: 'rgba(201,169,110,0.45)',
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1a1a',
          borderColor: 'rgba(201,169,110,0.3)',
          borderWidth: 1,
          titleColor: '#c9a96e',
          bodyColor: '#f5f0e8',
          callbacks: { label: ctx => ` $${ctx.raw.toFixed(2)}` }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(201,169,110,0.05)' },
          ticks: { color: '#555555', font: { family: 'Jost', size: 10 } }
        },
        y: {
          grid: { color: 'rgba(201,169,110,0.06)' },
          ticks: { color: '#555555', font: { family: 'Jost', size: 10 }, callback: v => '$'+v }
        }
      }
    }
  });
}

function setChartRange(dias, btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildChart(dashPedidos, dias);
}

/* ══════════════════════════════
   PEDIDOS
══════════════════════════════ */
async function renderPedidos(){
  document.getElementById('content').innerHTML = `
    <div class="pedidos-filters">
      <input class="pedidos-search" id="pedidoSearch" placeholder="Buscar por nombre o teléfono..." oninput="filtrarPedidos()">
      <select class="estado-filter" id="estadoFilter" onchange="filtrarPedidos()">
        <option value="">Todos los estados</option>
        <option value="pendiente">Pendiente</option>
        <option value="completado">Completado</option>
        <option value="cancelado">Cancelado</option>
      </select>
    </div>
    <div class="pedidos-table-wrap">
      <table class="pedidos-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Cliente</th>
            <th>Teléfono</th>
            <th>Items</th>
            <th>Total</th>
            <th>Estado</th>
            <th>Fecha</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="pedidosTbody">
          <tr><td colspan="8" style="text-align:center;padding:40px;color:var(--gris2)">Cargando pedidos...</td></tr>
        </tbody>
      </table>
    </div>`;

  await cargarPedidos();
}

async function cargarPedidos(){
  try {
    const snap = await db.collection("pedidos").orderBy("fecha","desc").get();
    allPedidos = [];
    snap.forEach(doc => allPedidos.push({id: doc.id, ...doc.data()}));
    renderTablaPedidos(allPedidos);
  } catch(e){
    // orderBy might fail without index, fallback
    try {
      const snap = await db.collection("pedidos").get();
      allPedidos = [];
      snap.forEach(doc => allPedidos.push({id: doc.id, ...doc.data()}));
      allPedidos.sort((a,b) => (b.fecha||'').localeCompare(a.fecha||''));
      renderTablaPedidos(allPedidos);
    } catch(e2){ console.error(e2); }
  }
}

function renderTablaPedidos(lista){
  const tbody = document.getElementById('pedidosTbody');
  if(!tbody) return;
  if(!lista.length){
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--gris2)">No hay pedidos aún.</td></tr>';
    return;
  }

  tbody.innerHTML = lista.map((p,i) => {
    const fecha = p.fecha ? new Date(p.fecha).toLocaleDateString('es-EC',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
    const items = (p.carrito||[]).length;
    const estado = p.estado || 'pendiente';
    const badgeClass = estado === 'completado' ? 'badge-completado' : estado === 'cancelado' ? 'badge-cancelado' : 'badge-pendiente';
    return `
      <tr>
        <td style="color:var(--gris2);font-size:11px">${String(i+1).padStart(3,'0')}</td>
        <td>${p.cliente||'—'}</td>
        <td style="color:var(--gris)">${p.telefono||'—'}</td>
        <td style="color:var(--gris)">${items} perfume${items!==1?'s':''}</td>
        <td class="pedido-total">$${Number(p.total||0).toFixed(2)}</td>
        <td><span class="badge ${badgeClass}">${estado}</span></td>
        <td style="color:var(--gris);font-size:11px;white-space:nowrap">${fecha}</td>
        <td><button class="btn-ver" onclick="verPedido('${p.id}')">Ver</button></td>
      </tr>`;
  }).join('');
}

function filtrarPedidos(){
  const q = (document.getElementById('pedidoSearch')?.value||'').toLowerCase();
  const est = document.getElementById('estadoFilter')?.value||'';
  const filtrado = allPedidos.filter(p => {
    const matchQ = !q || (p.cliente||'').toLowerCase().includes(q) || (p.telefono||'').includes(q);
    const matchE = !est || p.estado === est;
    return matchQ && matchE;
  });
  renderTablaPedidos(filtrado);
}

async function verPedido(id){
  const p = allPedidos.find(x => x.id === id);
  if(!p) return;

  const fecha = p.fecha ? new Date(p.fecha).toLocaleDateString('es-EC',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
  const estado = p.estado || 'pendiente';

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'pedidoModal';
  overlay.onclick = e => { if(e.target === overlay) cerrarModal(); };

  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Pedido #${String(allPedidos.indexOf(p)+1).padStart(3,'0')}</div>
        <button class="modal-close" onclick="cerrarModal()">✕</button>
      </div>

      <div class="modal-row"><span class="modal-key">Cliente</span><span class="modal-val">${p.cliente||'—'}</span></div>
      <div class="modal-row"><span class="modal-key">Teléfono</span><span class="modal-val">${p.telefono||'—'}</span></div>
      <div class="modal-row"><span class="modal-key">Fecha</span><span class="modal-val">${fecha}</span></div>
      <div class="modal-row"><span class="modal-key">Total</span><span class="modal-val" style="color:var(--or);font-family:'Cormorant Garamond',serif;font-size:20px">$${Number(p.total||0).toFixed(2)}</span></div>

      <div style="margin:20px 0 8px;font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:var(--gris)">Productos</div>
      <div class="modal-items">
        ${(p.carrito||[]).map(item=>`
          <div class="modal-item">
            <div class="modal-item-name">${item.envase||'—'}</div>
            <div class="modal-item-detail">Esencia: ${item.esencia||'—'} · Duración: ${item.duracion||'—'}</div>
            <div class="modal-item-price">$${Number(item.precio||0).toFixed(2)}</div>
          </div>`).join('')}
      </div>

      <div style="margin:16px 0 8px;font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:var(--gris)">Actualizar estado</div>
      <select class="estado-select" id="modalEstado" onchange="actualizarEstado('${id}',this.value)">
        <option value="pendiente" ${estado==='pendiente'?'selected':''}>Pendiente</option>
        <option value="completado" ${estado==='completado'?'selected':''}>Completado</option>
        <option value="cancelado" ${estado==='cancelado'?'selected':''}>Cancelado</option>
      </select>

      <div style="margin-top:16px;">
        <a href="https://wa.me/${(p.telefono||'').replace(/\D/g,'')}" target="_blank" style="color:#25d366;font-size:12px;letter-spacing:0.1em;text-decoration:none;">💬 Contactar por WhatsApp</a>
      </div>

      <button id="btnEliminarPedido"
        onclick="eliminarPedido('${id}')"
        style="display:${estado==='cancelado'?'block':'none'};margin-top:20px;width:100%;padding:14px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#ef4444;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;transition:all 0.3s;">
        🗑 Eliminar pedido permanentemente
      </button>
    </div>`;

  document.body.appendChild(overlay);
}

function cerrarModal(){
  const m = document.getElementById('pedidoModal');
  if(m) m.remove();
}

async function actualizarEstado(id, nuevoEstado){
  try {
    await db.collection("pedidos").doc(id).update({ estado: nuevoEstado });
    const p = allPedidos.find(x => x.id === id);
    if(p) p.estado = nuevoEstado;
    toast(`✓ Estado actualizado: ${nuevoEstado}`);
    filtrarPedidos();

    // Mostrar/ocultar botón eliminar según estado
    const btnEliminar = document.getElementById('btnEliminarPedido');
    if(btnEliminar){
      btnEliminar.style.display = nuevoEstado === 'cancelado' ? 'block' : 'none';
    }
  } catch(e){ toast('Error actualizando estado'); }
}

async function eliminarPedido(id){
  if(!confirm('¿Eliminar este pedido permanentemente? Esta acción no se puede deshacer.')) return;
  try {
    await db.collection("pedidos").doc(id).delete();
    allPedidos = allPedidos.filter(x => x.id !== id);
    toast('Pedido eliminado');
    cerrarModal();
    filtrarPedidos();
  } catch(e){ toast('Error eliminando pedido'); }
}

/* ══════════════════════════════
   ESENCIAS
══════════════════════════════ */
function renderEsencias(){
  document.getElementById('content').innerHTML = `
    <div class="form-card">
      <div class="form-card-title">Nueva esencia</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Nombre</label>
          <input class="form-input" id="esNombre" placeholder="Ej. Oud Oscuro">
        </div>
        <div class="form-group">
          <label class="form-label">URL de imagen</label>
          <input class="form-input" id="esImg" placeholder="https://...">
        </div>
      </div>
      <button class="btn btn-primary" onclick="crearEsencia()">Guardar esencia</button>
    </div>
    <div class="stats-row" id="esStats"></div>
    <div class="items-grid" id="esLista"></div>`;
  cargarEsencias();
}

async function crearEsencia(){
  const nombre = document.getElementById('esNombre').value.trim();
  const imagen = document.getElementById('esImg').value.trim();
  if(!nombre){ toast('Ingresa un nombre'); return; }
  await db.collection("esencias").add({nombre, imagen});
  document.getElementById('esNombre').value='';
  document.getElementById('esImg').value='';
  toast('✓ Esencia guardada');
  cargarEsencias();
}

async function cargarEsencias(){
  const snap = await db.collection("esencias").get();
  const lista = document.getElementById("esLista");
  const stats = document.getElementById("esStats");

  stats.innerHTML = `
    <div class="stat-card"><span class="stat-icon">✦</span><div><div class="stat-label">Total esencias</div><div class="stat-value">${snap.size}</div></div></div>
  `;

  lista.innerHTML = '';
  snap.forEach(doc=>{
    const d = doc.data();
    lista.innerHTML += `
      <div class="item-card">
        <img src="${d.imagen || 'https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?w=400&q=70'}" alt="${d.nombre}" onerror="this.src='https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?w=400&q=70'">
        <div class="item-body">
          <div class="item-name">${d.nombre}</div>
          <div class="item-actions">
            <button class="btn btn-edit" onclick="editarEsencia('${doc.id}','${d.nombre.replace(/'/g,"\\'")}','${d.imagen}')">Editar</button>
            <button class="btn btn-danger" onclick="eliminarEsencia('${doc.id}')">Eliminar</button>
          </div>
        </div>
      </div>`;
  });
}

async function editarEsencia(id, nombre, imagen){
  const n = prompt("Nombre:", nombre);
  if(n===null) return;
  const i = prompt("URL imagen:", imagen);
  if(i===null) return;
  await db.collection("esencias").doc(id).update({nombre:n, imagen:i});
  toast('✓ Esencia actualizada');
  cargarEsencias();
}

async function eliminarEsencia(id){
  if(!confirm("¿Eliminar esta esencia?")) return;
  await db.collection("esencias").doc(id).delete();
  toast('Esencia eliminada');
  cargarEsencias();
}

/* ══════════════════════════════
   ENVASES
══════════════════════════════ */
function renderEnvases(){
  document.getElementById('content').innerHTML = `
    <div class="form-card">
      <div class="form-card-title">Nuevo envase</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Nombre</label>
          <input class="form-input" id="envNombre" placeholder="Ej. Botella Noir">
        </div>
        <div class="form-group">
          <label class="form-label">Categoría</label>
          <select class="form-select" id="envCat">
            <option>30ml</option>
            <option>50ml</option>
            <option>100ml</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Precio base ($)</label>
          <input class="form-input" id="envPrecio" placeholder="0.00" type="number" min="0" step="0.01">
        </div>
        <div class="form-group">
          <label class="form-label">URL de imagen</label>
          <input class="form-input" id="envImg" placeholder="https://...">
        </div>
      </div>
      <button class="btn btn-primary" onclick="crearEnvase()">Guardar envase</button>
    </div>
    <div class="stats-row" id="envStats"></div>
    <div class="items-grid" id="envLista"></div>`;
  cargarEnvases();
}

async function crearEnvase(){
  const nombre = document.getElementById('envNombre').value.trim();
  const categoria = document.getElementById('envCat').value;
  const precio = document.getElementById('envPrecio').value;
  const imagen = document.getElementById('envImg').value.trim();
  if(!nombre){ toast('Ingresa un nombre'); return; }
  await db.collection("envases").add({nombre, categoria, precio: Number(precio)||0, imagen});
  document.getElementById('envNombre').value='';
  document.getElementById('envImg').value='';
  document.getElementById('envPrecio').value='';
  toast('✓ Envase guardado');
  cargarEnvases();
}

async function cargarEnvases(){
  const snap = await db.collection("envases").get();
  const lista = document.getElementById("envLista");
  const stats = document.getElementById("envStats");

  stats.innerHTML = `
    <div class="stat-card"><span class="stat-icon">◈</span><div><div class="stat-label">Total envases</div><div class="stat-value">${snap.size}</div></div></div>
  `;

  lista.innerHTML = '';
  snap.forEach(doc=>{
    const d = doc.data();
    lista.innerHTML += `
      <div class="item-card">
        <img src="${d.imagen || 'https://images.unsplash.com/photo-1541643600914-78b084683702?w=400&q=70'}" alt="${d.nombre}" onerror="this.src='https://images.unsplash.com/photo-1541643600914-78b084683702?w=400&q=70'">
        <div class="item-body">
          <div class="item-name">${d.nombre}</div>
          <div class="item-meta">${d.categoria} · $${d.precio||0}</div>
          <div class="item-actions">
            <button class="btn btn-edit" onclick="editarEnvase('${doc.id}','${d.nombre.replace(/'/g,"\\'")}','${d.categoria}','${d.imagen}','${d.precio||0}')">Editar</button>
            <button class="btn btn-danger" onclick="eliminarEnvase('${doc.id}')">Eliminar</button>
          </div>
        </div>
      </div>`;
  });
}

async function editarEnvase(id,n,c,i,p){
  const nn = prompt("Nombre:", n); if(nn===null) return;
  const cc = prompt("Categoría (30ml/50ml/100ml):", c); if(cc===null) return;
  const pp = prompt("Precio:", p); if(pp===null) return;
  const ii = prompt("URL imagen:", i); if(ii===null) return;
  await db.collection("envases").doc(id).update({nombre:nn, categoria:cc, precio:Number(pp)||0, imagen:ii});
  toast('✓ Envase actualizado');
  cargarEnvases();
}

async function eliminarEnvase(id){
  if(!confirm("¿Eliminar este envase?")) return;
  await db.collection("envases").doc(id).delete();
  toast('Envase eliminado');
  cargarEnvases();
}

/* ══════════════════════════════
   POLÍTICAS
══════════════════════════════ */
function renderPoliticas(){
  editingId = null;
  document.getElementById('content').innerHTML = `
    <div class="form-card">
      <div class="form-card-title" id="polFormTitle">Nueva política</div>

      <div class="form-group">
        <label class="form-label">Título</label>
        <input class="form-input" id="polTitulo" placeholder="Ej. Política de Privacidad" style="font-size:16px;">
      </div>

      <div class="toolbar">
        <select class="toolbar-select" onchange="fmt('fontName',this.value)">
          <option value="Jost">Jost</option>
          <option value="Georgia">Georgia</option>
          <option value="Arial">Arial</option>
        </select>
        <select class="toolbar-select" onchange="fmt('fontSize',this.value)">
          <option value="3">Normal</option>
          <option value="4">Medio</option>
          <option value="5">Grande</option>
          <option value="6">Título</option>
        </select>
        <input type="color" class="toolbar-color" onchange="fmt('foreColor',this.value)" title="Color">
        <button class="toolbar-btn" onclick="fmt('bold')" title="Negrita"><b>B</b></button>
        <button class="toolbar-btn" onclick="fmt('italic')" title="Cursiva"><i>I</i></button>
        <button class="toolbar-btn" onclick="fmt('underline')" title="Subrayado"><u>U</u></button>
        <button class="toolbar-btn" onclick="fmt('justifyLeft')" title="Izq">⬅</button>
        <button class="toolbar-btn" onclick="fmt('justifyCenter')" title="Centro">⬌</button>
        <button class="toolbar-btn" onclick="fmt('justifyRight')" title="Der">➡</button>
        <button class="toolbar-btn" onclick="fmt('insertUnorderedList')" title="Lista">• Lista</button>
      </div>

      <div class="editor-area" id="polEditor" contenteditable="true" placeholder="Escribe el contenido de la política..."></div>

      <div style="display:flex;gap:12px;margin-top:20px;">
        <button class="btn btn-primary" onclick="guardarPolitica()">Guardar política</button>
        <button class="btn btn-outline" id="cancelEditBtn" onclick="cancelarEdicion()" style="display:none">Cancelar</button>
      </div>
    </div>
    <div id="polLista"></div>`;

  cargarPoliticas();
}

function fmt(cmd, val=null){ document.execCommand(cmd,false,val); }

function cancelarEdicion(){
  editingId=null;
  document.getElementById('polTitulo').value='';
  document.getElementById('polEditor').innerHTML='';
  document.getElementById('polFormTitle').textContent='Nueva política';
  document.getElementById('cancelEditBtn').style.display='none';
  toast('Edición cancelada');
}

async function guardarPolitica(){
  const titulo = document.getElementById('polTitulo').value.trim();
  const contenido = document.getElementById('polEditor').innerHTML.trim();
  if(!titulo){ toast('Ingresa un título'); return; }
  if(!contenido || contenido==='<br>'){ toast('Ingresa contenido'); return; }

  if(editingId){
    await db.collection("politicas").doc(editingId).update({titulo, contenido});
    editingId = null;
    document.getElementById('cancelEditBtn').style.display='none';
    document.getElementById('polFormTitle').textContent='Nueva política';
    toast('✓ Política actualizada');
  } else {
    await db.collection("politicas").add({titulo, contenido});
    toast('✓ Política guardada');
  }

  document.getElementById('polTitulo').value='';
  document.getElementById('polEditor').innerHTML='';
  cargarPoliticas();
}

async function cargarPoliticas(){
  const snap = await db.collection("politicas").get();
  const lista = document.getElementById("polLista");
  lista.innerHTML='';

  snap.forEach(doc=>{
    const d = doc.data();
    lista.innerHTML += `
      <div class="politica-card">
        <div class="politica-titulo">${d.titulo}</div>
        <div class="politica-preview">${d.contenido}</div>
        <div class="politica-actions">
          <button class="btn btn-edit" onclick="editarPolitica('${doc.id}')">Editar</button>
          <button class="btn btn-danger" onclick="eliminarPolitica('${doc.id}')">Eliminar</button>
        </div>
      </div>`;
  });

  if(snap.empty){ lista.innerHTML='<p style="color:var(--gris2);font-size:13px;padding:8px 0;">No hay políticas creadas aún.</p>'; }
}

async function editarPolitica(id){
  const doc = await db.collection("politicas").doc(id).get();
  const d = doc.data();
  editingId = id;
  document.getElementById('polTitulo').value = d.titulo;
  document.getElementById('polEditor').innerHTML = d.contenido;
  document.getElementById('polFormTitle').textContent='Editando política';
  document.getElementById('cancelEditBtn').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
  toast('Editando: ' + d.titulo);
}

async function eliminarPolitica(id){
  if(!confirm("¿Eliminar esta política?")) return;
  await db.collection("politicas").doc(id).delete();
  toast('Política eliminada');
  cargarPoliticas();
}

/* ── LOGOUT ── */
function logout(){
  if(!confirm("¿Cerrar sesión?")) return;
  firebase.auth().signOut().then(()=>{
    localStorage.clear();
    window.location.href="login.html";
  });
}

/* ── INIT ── */
showSection('dashboard');
</script>
