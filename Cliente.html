<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personaliza tu Perfume — Tendencia</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ccircle cx=%2750%27 cy=%2750%27 r=%2748%27 fill=%27%230a0a0a%27 stroke=%27%23c9a96e%27 stroke-width=%272.5%27/%3E%3Ctext x=%2750%27 y=%2768%27 font-family=%27Georgia,serif%27 font-size=%2760%27 font-weight=%27bold%27 fill=%27%23c9a96e%27 text-anchor=%27middle%27%3ET%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --noir: #0a0a0a;
  --noir2: #111111;
  --noir3: #1a1a1a;
  --or: #c9a96e;
  --or2: #e8cc99;
  --creme: #f5f0e8;
  --creme2: #ede6d6;
  --blanc: #ffffff;
  --gris: #888888;
  --gris2: #555555;
  --border: rgba(201,169,110,0.2);
  --border2: rgba(201,169,110,0.08);
  --success: #4ade80;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Jost', sans-serif;
  background: var(--noir);
  color: var(--creme);
  min-height: 100vh;
}

/* ── LAYOUT ── */
.page {
  display: grid;
  grid-template-columns: 1fr 380px;
  min-height: 100vh;
}

/* ── LEFT PANEL ── */
.left {
  padding: 0 0 80px;
  overflow-y: auto;
}

/* ── TOPBAR ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 48px;
  border-bottom: 1px solid var(--border2);
  position: sticky;
  top: 0;
  background: rgba(10,10,10,0.95);
  backdrop-filter: blur(12px);
  z-index: 10;
}

.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 300;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--or2);
}

.btn-back {
  display: flex;
  align-items: center;
  gap: 10px;
  background: none;
  border: 1px solid var(--border);
  color: var(--gris);
  padding: 8px 20px;
  font-family: 'Jost', sans-serif;
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  transition: all 0.3s;
}

.btn-back:hover { border-color: var(--or); color: var(--or); }

/* ── SECTION HEADER ── */
.main-content { padding: 48px; }

.step-header {
  margin-bottom: 32px;
}

.step-label {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}

.step-num-badge {
  width: 24px; height: 24px;
  border: 1px solid var(--or);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: var(--or);
  font-weight: 500;
  flex-shrink: 0;
}

.step-label-text {
  font-size: 10px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--or);
}

.step-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 300;
  color: var(--creme);
}

.step-separator {
  width: 100%;
  height: 1px;
  background: var(--border2);
  margin: 48px 0;
}

/* ── GRID DE CARDS ── */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 16px;
}

.prod-card {
  background: var(--noir2);
  border: 1px solid var(--border2);
  border-radius: 2px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.35s ease;
  position: relative;
}

.prod-card:hover {
  border-color: rgba(201,169,110,0.4);
  transform: translateY(-3px);
  box-shadow: 0 12px 32px rgba(0,0,0,0.4);
}

.prod-card.active {
  border-color: var(--or);
  box-shadow: 0 0 0 1px var(--or);
}

.prod-card.active::before {
  content: '✓';
  position: absolute;
  top: 10px; right: 10px;
  width: 22px; height: 22px;
  background: var(--or);
  color: var(--noir);
  border-radius: 50%;
  font-size: 10px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
}

.prod-card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  filter: brightness(0.85);
  transition: filter 0.3s, transform 0.4s;
}

.prod-card:hover img {
  filter: brightness(0.95);
  transform: scale(1.04);
}

.prod-info {
  padding: 14px 16px;
}

.prod-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  font-weight: 400;
  color: var(--creme);
  margin-bottom: 4px;
}

.prod-cat {
  font-size: 11px;
  color: var(--gris);
  letter-spacing: 0.1em;
  margin-bottom: 8px;
}

.prod-price {
  font-size: 14px;
  color: var(--or);
  font-weight: 500;
  letter-spacing: 0.05em;
}

/* ── DURACION ── */
.duracion-opts {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}

.dur-opt {
  flex: 1;
  min-width: 160px;
  padding: 20px 24px;
  background: var(--noir2);
  border: 1px solid var(--border2);
  cursor: pointer;
  transition: all 0.3s;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 16px;
}

.dur-opt:hover { border-color: rgba(201,169,110,0.4); }

.dur-opt.active {
  border-color: var(--or);
  background: rgba(201,169,110,0.06);
}

.dur-icon {
  font-size: 24px;
  flex-shrink: 0;
}

.dur-opt h4 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 400;
  color: var(--creme);
  margin-bottom: 2px;
}

.dur-opt p {
  font-size: 12px;
  color: var(--gris);
}

.dur-price-badge {
  margin-left: auto;
  font-size: 11px;
  color: var(--or);
  background: rgba(201,169,110,0.1);
  padding: 3px 8px;
  border-radius: 99px;
  letter-spacing: 0.05em;
  white-space: nowrap;
}

/* ── FORM ── */
.form-group {
  margin-bottom: 16px;
}

.form-label {
  display: block;
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gris);
  margin-bottom: 8px;
}

.form-input {
  width: 100%;
  padding: 14px 18px;
  background: var(--noir2);
  border: 1px solid var(--border2);
  color: var(--creme);
  font-family: 'Jost', sans-serif;
  font-size: 14px;
  font-weight: 300;
  transition: border-color 0.3s;
  border-radius: 0;
  outline: none;
}

.form-input:focus { border-color: var(--or); }
.form-input::placeholder { color: var(--gris2); }

.btn-add {
  width: 100%;
  padding: 18px;
  background: transparent;
  border: 1px solid var(--or);
  color: var(--or);
  font-family: 'Jost', sans-serif;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-top: 8px;
  transition: all 0.35s ease;
  position: relative;
  overflow: hidden;
}

.btn-add::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--or);
  transform: translateX(-100%);
  transition: transform 0.35s ease;
}

.btn-add:hover::before { transform: translateX(0); }
.btn-add:hover { color: var(--noir); }
.btn-add span { position: relative; z-index: 1; }

/* ── RIGHT PANEL (RESUMEN) ── */
.right {
  background: var(--noir2);
  border-left: 1px solid var(--border);
  position: sticky;
  top: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.right-header {
  padding: 32px 32px 24px;
  border-bottom: 1px solid var(--border2);
}

.right-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  font-weight: 300;
  color: var(--creme);
  margin-bottom: 6px;
}

.right-note {
  font-size: 11px;
  color: var(--gris2);
  letter-spacing: 0.08em;
}

.right-body {
  flex: 1;
  overflow-y: auto;
  padding: 24px 32px;
}

.right-body::-webkit-scrollbar { width: 4px; }
.right-body::-webkit-scrollbar-track { background: transparent; }
.right-body::-webkit-scrollbar-thumb { background: var(--border); }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
}

.empty-icon {
  font-size: 40px;
  display: block;
  margin-bottom: 16px;
  opacity: 0.3;
}

.empty-text {
  font-size: 13px;
  color: var(--gris2);
  line-height: 1.7;
}

/* Items del carrito */
.cart-item {
  padding: 16px;
  border: 1px solid var(--border2);
  margin-bottom: 10px;
  position: relative;
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(12px); }
  to   { opacity: 1; transform: translateX(0); }
}

.cart-item-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  color: var(--creme);
  margin-bottom: 4px;
}

.cart-item-detail {
  font-size: 11px;
  color: var(--gris);
  letter-spacing: 0.08em;
  margin-bottom: 8px;
  text-transform: uppercase;
}

.cart-item-price {
  font-size: 15px;
  color: var(--or);
  font-weight: 500;
}

.cart-item-remove {
  position: absolute;
  top: 12px; right: 12px;
  background: none;
  border: none;
  color: var(--gris2);
  font-size: 16px;
  line-height: 1;
  padding: 4px;
  transition: color 0.2s;
}
.cart-item-remove:hover { color: #ef4444; }

.right-footer {
  padding: 24px 32px;
  border-top: 1px solid var(--border);
  background: var(--noir2);
}

.total-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 20px;
}

.total-label {
  font-size: 11px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gris);
}

.total-amount {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 300;
  color: var(--or);
}

.btn-confirm {
  width: 100%;
  padding: 18px;
  background: var(--or);
  border: none;
  color: var(--noir);
  font-family: 'Jost', sans-serif;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  transition: all 0.35s;
  margin-bottom: 12px;
}

.btn-confirm:hover {
  background: var(--or2);
  transform: translateY(-1px);
  box-shadow: 0 8px 20px rgba(201,169,110,0.2);
}

.btn-whatsapp {
  width: 100%;
  padding: 15px;
  background: transparent;
  border: 1px solid #25d366;
  color: #25d366;
  font-family: 'Jost', sans-serif;
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  text-decoration: none;
  display: block;
  text-align: center;
  transition: all 0.3s;
}

.btn-whatsapp:hover {
  background: rgba(37,211,102,0.1);
}

/* ── LOADING ── */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: var(--noir);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
  transition: opacity 0.5s ease;
}

.loading-overlay.hidden { opacity: 0; pointer-events: none; }

.loading-spinner {
  text-align: center;
}

.spinner-ring {
  width: 48px; height: 48px;
  border: 1px solid var(--border2);
  border-top-color: var(--or);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 300;
  color: var(--gris);
  letter-spacing: 0.15em;
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--noir3);
  border: 1px solid var(--border);
  color: var(--creme);
  padding: 14px 24px;
  font-size: 13px;
  letter-spacing: 0.05em;
  opacity: 0;
  transition: all 0.35s ease;
  z-index: 500;
  white-space: nowrap;
}

.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── MOBILE ── */
@media (max-width: 900px) {
  .page { grid-template-columns: 1fr; }

  .right {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: auto;
    max-height: 55vh;
    border-left: none;
    border-top: 1px solid var(--border);
    z-index: 50;
    transform: translateY(calc(100% - 70px));
    transition: transform 0.4s ease;
  }

  .right.open { transform: translateY(0); }

  .right-header {
    cursor: pointer;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .right-header::after {
    content: '↑';
    color: var(--or);
    font-size: 18px;
    transition: transform 0.3s;
  }

  .right.open .right-header::after { transform: rotate(180deg); }

  .left { padding-bottom: 80px; }
  .main-content { padding: 24px; }
  .topbar { padding: 16px 24px; }
  .cards-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner">
    <div class="spinner-ring"></div>
    <p class="loading-text">Cargando colección...</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="page">

  <!-- LEFT -->
  <div class="left">
    <div class="topbar">
      <div class="logo">Tendencia</div>
      <button class="btn-back" onclick="volver()">← Volver</button>
    </div>

    <div class="main-content">

      <!-- STEP 1: ENVASE -->
      <div class="step-header">
        <div class="step-label">
          <div class="step-num-badge">1</div>
          <span class="step-label-text">Primer paso</span>
        </div>
        <h2 class="step-title">Elige tu envase</h2>
      </div>
      <div class="cards-grid" id="envases">
        <div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--gris2);">Cargando...</div>
      </div>

      <div class="step-separator"></div>

      <!-- STEP 2: ESENCIA -->
      <div class="step-header">
        <div class="step-label">
          <div class="step-num-badge">2</div>
          <span class="step-label-text">Segundo paso</span>
        </div>
        <h2 class="step-title">Selecciona la esencia</h2>
      </div>
      <div class="cards-grid" id="esencias">
        <div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--gris2);">Cargando...</div>
      </div>

      <div class="step-separator"></div>

      <!-- STEP 3: DURACION -->
      <div class="step-header">
        <div class="step-label">
          <div class="step-num-badge">3</div>
          <span class="step-label-text">Tercer paso</span>
        </div>
        <h2 class="step-title">Elige la intensidad</h2>
      </div>
      <div class="duracion-opts">
        <button class="dur-opt active" onclick="setDuracion(this,'moderada')">
          <span class="dur-icon">◈</span>
          <div>
            <h4>Moderada</h4>
            <p>4–6 horas de permanencia</p>
          </div>
          <span class="dur-price-badge">+$1</span>
        </button>
        <button class="dur-opt" onclick="setDuracion(this,'alta')">
          <span class="dur-icon">✦</span>
          <div>
            <h4>Alta</h4>
            <p>8–12 horas de permanencia</p>
          </div>
          <span class="dur-price-badge">+$2</span>
        </button>
      </div>

      <div class="step-separator"></div>

      <!-- STEP 4: DATOS -->
      <div class="step-header">
        <div class="step-label">
          <div class="step-num-badge">4</div>
          <span class="step-label-text">Último paso</span>
        </div>
        <h2 class="step-title">Tus datos</h2>
      </div>
      <div class="form-group">
        <label class="form-label">Nombre completo</label>
        <input class="form-input" id="nombreCliente" placeholder="Tu nombre">
      </div>
      <div class="form-group">
        <label class="form-label">Teléfono</label>
        <input class="form-input" id="telefonoCliente" placeholder="+593 999 999 999" type="tel">
      </div>

      <button class="btn-add" onclick="agregar()"><span>Añadir al pedido →</span></button>

    </div>
  </div>

  <!-- RIGHT (RESUMEN) -->
  <div class="right" id="rightPanel">
    <div class="right-header" id="rightHeader" onclick="togglePanel()">
      <div>
        <p class="right-title">Tu pedido</p>
        <p class="right-note">El envío se coordina por separado</p>
      </div>
    </div>

    <div class="right-body" id="cartBody">
      <div class="empty-state" id="emptyState">
        <span class="empty-icon">◇</span>
        <p class="empty-text">Aún no has añadido<br>ningún perfume.</p>
      </div>
      <div id="cartItems"></div>
    </div>

    <div class="right-footer">
      <div class="total-row">
        <span class="total-label">Total</span>
        <span class="total-amount" id="totalAmount">$0</span>
      </div>
      <button class="btn-confirm" onclick="confirmar()">Confirmar pedido</button>
      <div id="whatsappLink"></div>
    </div>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyClkqdEQiTeSdQqjdqbQ4nxTrXbuf9_h-0",
  authDomain: "perfumeria-app.firebaseapp.com",
  projectId: "perfumeria-app"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let envaseSeleccionado = null;
let esenciaSeleccionada = null;
let duracion = "moderada";
let carrito = [];

/* ── TOAST ── */
function showToast(msg, duration=2500){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), duration);
}

/* ── PANEL MOBILE ── */
function togglePanel(){
  document.getElementById('rightPanel').classList.toggle('open');
}

/* ── LOAD DATA ── */
async function cargarDatos(){
  try {
    const [envSnap, esSnap] = await Promise.all([
      db.collection("envases").get(),
      db.collection("esencias").get()
    ]);

    const envDiv = document.getElementById("envases");
    envDiv.innerHTML = "";
    envSnap.forEach(doc=>{
      const d = doc.data();
      const dataStr = JSON.stringify(d).replace(/"/g,'&quot;');
      envDiv.innerHTML += `
        <div class="prod-card" onclick="selEnvase(this,'${doc.id}',this.dataset.obj)" data-obj="${dataStr}">
          <img src="${d.imagen || 'https://images.unsplash.com/photo-1541643600914-78b084683702?w=400&q=70'}" alt="${d.nombre}" onerror="this.src='https://images.unsplash.com/photo-1541643600914-78b084683702?w=400&q=70'">
          <div class="prod-info">
            <div class="prod-name">${d.nombre}</div>
            <div class="prod-cat">${d.categoria || ''}</div>
            <div class="prod-price">$${d.precio || '—'}</div>
          </div>
        </div>`;
    });

    const esDiv = document.getElementById("esencias");
    esDiv.innerHTML = "";
    esSnap.forEach(doc=>{
      const d = doc.data();
      esDiv.innerHTML += `
        <div class="prod-card" onclick="selEsencia(this,'${d.nombre}')">
          <img src="${d.imagen || 'https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?w=400&q=70'}" alt="${d.nombre}" onerror="this.src='https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?w=400&q=70'">
          <div class="prod-info">
            <div class="prod-name">${d.nombre}</div>
          </div>
        </div>`;
    });

    document.getElementById('loadingOverlay').classList.add('hidden');

  } catch(err) {
    console.error(err);
    document.getElementById('loadingOverlay').classList.add('hidden');
    showToast('Error cargando datos. Verifica tu conexión.');
  }
}

/* ── SELECCION ── */
function selEnvase(el, id, dataStr){
  document.querySelectorAll('#envases .prod-card').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  try { envaseSeleccionado = JSON.parse(el.dataset.obj); } catch(e){ envaseSeleccionado = {nombre: el.querySelector('.prod-name').textContent}; }
}

function selEsencia(el, nombre){
  document.querySelectorAll('#esencias .prod-card').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  esenciaSeleccionada = nombre;
}

function setDuracion(btn, val){
  document.querySelectorAll('.dur-opt').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  duracion = val;
}

/* ── PRECIO ── */
function calcPrecio(){
  if(!envaseSeleccionado) return 0;
  return Number(envaseSeleccionado.precio || 0) + (duracion === "alta" ? 2 : 1);
}

/* ── AGREGAR ── */
function agregar(){
  if(!envaseSeleccionado){ showToast('Selecciona un envase'); return; }
  if(!esenciaSeleccionada){ showToast('Selecciona una esencia'); return; }

  const precio = calcPrecio();
  carrito.push({ envase: envaseSeleccionado.nombre, esencia: esenciaSeleccionada, duracion, precio });
  renderCarrito();
  showToast('✓ Añadido al pedido');

  // Reset selecciones
  envaseSeleccionado = null;
  esenciaSeleccionada = null;
  document.querySelectorAll('.prod-card').forEach(c=>c.classList.remove('active'));

  // Abrir panel en móvil
  document.getElementById('rightPanel').classList.add('open');
}

/* ── RENDER CARRITO ── */
function renderCarrito(){
  const itemsDiv = document.getElementById('cartItems');
  const emptyDiv = document.getElementById('emptyState');
  const total = carrito.reduce((a,b)=>a+b.precio, 0);

  emptyDiv.style.display = carrito.length ? 'none' : 'block';

  itemsDiv.innerHTML = '';
  carrito.forEach((p,i)=>{
    itemsDiv.innerHTML += `
      <div class="cart-item">
        <button class="cart-item-remove" onclick="remover(${i})">✕</button>
        <div class="cart-item-name">${p.envase}</div>
        <div class="cart-item-detail">${p.esencia} · ${p.duracion}</div>
        <div class="cart-item-price">$${p.precio}</div>
      </div>`;
  });

  document.getElementById('totalAmount').textContent = '$' + total;
}

function remover(i){
  carrito.splice(i, 1);
  renderCarrito();
}

/* ── CONFIRMAR ── */
async function confirmar(){
  if(carrito.length === 0){ showToast('Agrega al menos un perfume'); return; }

  const nombre = document.getElementById('nombreCliente').value.trim();
  const telefono = document.getElementById('telefonoCliente').value.trim();
  if(!nombre || !telefono){ showToast('Completa tu nombre y teléfono'); return; }

  const total = carrito.reduce((a,b)=>a+b.precio, 0);

  try {
    await db.collection("pedidos").add({
      cliente: nombre,
      telefono,
      carrito,
      total,
      estado: "pendiente",
      fecha: new Date().toISOString()
    });
  } catch(e) { console.warn('No se pudo guardar en Firebase:', e); }

  let msg = `Hola! Quiero hacer un pedido 🌸\n\nNombre: ${nombre}\nTeléfono: ${telefono}\n\n`;
  carrito.forEach((p,i)=>{
    msg += `Perfume ${i+1}:\n  Envase: ${p.envase}\n  Esencia: ${p.esencia}\n  Duración: ${p.duracion}\n  Precio: $${p.precio}\n\n`;
  });
  msg += `Total: $${total}\n\n(El costo del envío es aparte)`;

  const url = "https://wa.me/593969518798?text=" + encodeURIComponent(msg);

  document.getElementById('whatsappLink').innerHTML = `
    <a class="btn-whatsapp" href="${url}" target="_blank">💬 Enviar por WhatsApp</a>`;

  showToast('¡Pedido listo! Envíalo por WhatsApp', 3500);
}

function volver(){ window.location.href = "Perfumeria.html"; }

cargarDatos();
</script>
